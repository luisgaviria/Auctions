name: Geocode Auctions

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  geocode:
    name: Fill missing coordinates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "${{ secrets.DATABASE_URL }}"
      MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
      ENV: PROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      # ✅ Force IPv4 to resolve Supabase connection issues
      - name: Fix IPv6 Network Unreachable
        run: sudo sh -c 'echo "precedence ::ffff:0:0/96  100" >> /etc/gai.conf'

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run geocode worker
        working-directory: backend
        run: go run ./cmd/geocode
