name: Geocode Auctions

on:
  # Run automatically 30 minutes after the daily scrape finishes
  # (scrape runs at 12:00 UTC, geocode at 12:30 UTC)
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  geocode:
    name: Fill missing coordinates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      MAPTILER_API_KEY:  ${{ secrets.MAPTILER_API_KEY }}
      ENV: PROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run geocode worker
        working-directory: backend
        run: go run ./cmd/geocode
